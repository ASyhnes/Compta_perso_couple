<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6366f1">
  <meta name="description" content="Application de gestion de budget pour couple">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Compta Couple - Connexion</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-icon">💰</div>
        <h1>Compta Couple</h1>
        <p>David & Léo</p>
      </div>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="username">Utilisateur</label>
          <select id="username" name="username" required>
            <option value="">Choisir...</option>
            <option value="david">David</option>
            <option value="leo">Léo</option>
          </select>
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" name="password" required placeholder="Entrez votre mot de passe">
        </div>

        <button type="submit" class="btn btn-primary btn-block">
          Se connecter
        </button>

        <div id="loginError" class="error-message" style="display: none;"></div>
      </form>

      <div class="login-footer">
        <small>💡 Mots de passe par défaut : david / leo</small>
      </div>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js').then((registration) => {
          registration.update();

          registration.addEventListener('updatefound', () => {
            const newWorker = registration.installing;
            if (!newWorker) {
              return;
            }

            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                window.location.reload();
              }
            });
          });
        }).catch((error) => {
          console.warn('Service worker registration failed:', error);
        });
      });
    }

    // Vérifier si déjà connecté
    fetch('/api/session', { credentials: 'same-origin' })
      .then(res => res.json())
      .then(data => {
        if (data.authenticated) {
          window.location.href = '/app.html';
        }
      });

    // Gestion du formulaire de connexion
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('loginError');

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (data.success) {
          // Laisser un court délai pour que le cookie de session soit écrit avant la redirection.
          setTimeout(() => {
            window.location.href = '/app.html';
          }, 150);
        } else {
          errorDiv.textContent = data.error || 'Erreur de connexion';
          errorDiv.style.display = 'block';
        }
      } catch (error) {
        errorDiv.textContent = 'Erreur de connexion au serveur';
        errorDiv.style.display = 'block';
      }
    });
  </script>
</body>
</html>
